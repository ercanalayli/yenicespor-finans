<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yenice Spor Finans</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f6fa;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tx-income{
color:#16a34a;
font-weight:700;
}

.tx-expense{
color:#dc2626;
font-weight:700;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#111;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

input{
padding:8px;
margin-bottom:10px;
width:100%;
}
</style>

</head>

<body>

<header>
YENİCE SPOR FİNANS v3.4
</header>

<div class="container">

<div class="card">
<h3>İşlem Ekle</h3>

<select id="type">
<option value="GELIR">Gelir</option>
<option value="GIDER">Gider</option>
</select>

<input id="cari" placeholder="Cari adı">

<input id="amount" type="number" placeholder="Tutar">

<button onclick="addTx()">Kaydet</button>

</div>

<div class="card">
<h3>Son İşlemler</h3>

<table width="100%" id="txTable">
<tr>
<th>Tarih</th>
<th>Tür</th>
<th>Cari</th>
<th>Tutar</th>
<th>Sil</th>
</tr>
</table>

</div>

</div>

<script>

let tx = JSON.parse(localStorage.getItem("ys_tx")||"[]")

function save(){
localStorage.setItem("ys_tx",JSON.stringify(tx))
}

function render(){

let table=document.getElementById("txTable")

table.innerHTML=`
<tr>
<th>Tarih</th>
<th>Tür</th>
<th>Cari</th>
<th>Tutar</th>
<th>Sil</th>
</tr>
`

tx.forEach((t,i)=>{

let cls=t.type=="GELIR"?"tx-income":"tx-expense"

table.innerHTML+=`
<tr class="${cls}">
<td>${t.date}</td>
<td>${t.type}</td>
<td>${t.cari}</td>
<td>${t.amount}</td>
<td><button onclick="del(${i})">🗑</button></td>
</tr>
`

})

}

function addTx(){

let t={
date:new Date().toLocaleDateString(),
type:document.getElementById("type").value,
cari:document.getElementById("cari").value,
amount:document.getElementById("amount").value
}

tx.push(t)

save()
render()

}

function del(i){

if(confirm("Silmek istiyor musun?")){
tx.splice(i,1)
save()
render()
}

}

render()

</script>

</body>
</html>
